# syntax=docker/dockerfile:1

services:
  # ──────────────────────────────────────────
  # Backend — FastAPI + SQLite
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: remservice-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - sqlite-data:/app
    networks:
      - remservice-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  # ──────────────────────────────────────────
  # Frontend — Vue 3 + Nginx
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: http://backend:8000
    container_name: remservice-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - remservice-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.25'

# ──────────────────────────────────────────
# Networks
# ──────────────────────────────────────────
networks:
  remservice-network:
    driver: bridge
    name: remservice-network

# ──────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────
volumes:
  sqlite-data:
    name: remservice-sqlite-data
    driver: local
